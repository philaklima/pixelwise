[pytest]
# Put the repo root on sys.path so `from app.classifier import ...`
# resolves no matter how pytest is launched. The auto-deploy gate calls
# the `pytest` console script, which (unlike `python -m pytest`) does not
# add the current directory to sys.path; without this the deploy fails
# collection with "ModuleNotFoundError: No module named 'app'".
pythonpath = .
testpaths = tests
